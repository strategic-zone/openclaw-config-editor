<!DOCTYPE html>
<html lang="en">

<title>OpenClaw Config Editor</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1e1e2e;--bg2:#181825;--bg3:#11111b;--surface:#313244;--hover:#45475a;
  --border:#45475a;--border-focus:#89b4fa;
  --text:#cdd6f4;--text2:#a6adc8;--muted:#6c7086;--bright:#f5f5f5;
  --accent:#89b4fa;--accent2:#74c7ec;--green:#a6e3a1;--red:#f38ba8;
  --yellow:#f9e2af;--peach:#fab387;--mauve:#cba6f7;--teal:#94e2d5;--pink:#f5c2e7;
  --r:6px;--rl:10px;--shadow:0 2px 8px rgba(0,0,0,.3);
  --sidebar:260px;--topbar:50px;--mono:'Consolas','Courier New',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
html{font-size:14px}
body{font-family:var(--sans);background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--hover);border-radius:4px}
#app{display:flex;flex-direction:column;height:100vh}
.topbar{height:var(--topbar);background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:100}
.topbar .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:1rem;color:var(--bright)}
.topbar .logo svg{width:20px;height:20px}
.topbar .actions{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.main-wrap{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;scrollbar-width:thin}
.content{flex:1;overflow-y:auto;padding:24px 32px;scrollbar-width:thin}
.preview{width:0;overflow:hidden;transition:width .2s;background:var(--bg3);border-left:1px solid var(--border);position:relative}
.preview.open{width:400px}
.preview pre{padding:14px;font-family:var(--mono);font-size:.78rem;color:var(--text2);overflow:auto;height:calc(100vh - var(--topbar) - 40px);white-space:pre;tab-size:2;scrollbar-width:thin}
.preview-hdr{height:40px;display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--border);font-weight:600;font-size:.82rem;color:var(--text2)}
.preview-hdr span{flex:1}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-size:.78rem;font-weight:500;cursor:pointer;transition:.15s;white-space:nowrap}
.btn:hover{background:var(--hover);border-color:var(--accent)}
.btn-p{background:var(--accent);color:var(--bg3);border-color:var(--accent);font-weight:600}
.btn-p:hover{background:var(--accent2)}
.btn-d{border-color:var(--red);color:var(--red)}
.btn-d:hover{background:rgba(243,139,168,.12)}
.btn-sm{padding:3px 8px;font-size:.72rem}
.btn svg{width:14px;height:14px;flex-shrink:0}
.sb-sec{border-bottom:1px solid var(--border)}
.sb-hdr{display:flex;align-items:center;padding:9px 14px;cursor:pointer;user-select:none;gap:7px;font-weight:600;font-size:.82rem;color:var(--text2);transition:.15s}
.sb-hdr:hover{background:var(--surface);color:var(--text)}
.sb-hdr.active{color:var(--accent);background:rgba(137,180,250,.08)}
.sb-hdr .chv{transition:transform .15s;font-size:.65rem;opacity:.5;margin-left:auto}
.sb-hdr.exp .chv{transform:rotate(90deg)}
.sb-hdr .ico{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-hdr .ico svg{width:15px;height:15px}
.sb-items{display:none;padding:2px 0 5px}
.sb-hdr.exp+.sb-items{display:block}
.sb-item{padding:5px 14px 5px 40px;font-size:.78rem;color:var(--muted);cursor:pointer;transition:.15s}
.sb-item:hover{color:var(--text);background:var(--surface)}
.sb-item.active{color:var(--accent);background:rgba(137,180,250,.06)}
.sec-title{font-size:1.2rem;font-weight:700;margin-bottom:4px;color:var(--bright);display:flex;align-items:center;gap:8px}
.sec-title svg{width:22px;height:22px;flex-shrink:0}
.sec-desc{color:var(--muted);font-size:.82rem;margin-bottom:20px;line-height:1.4}
.field-group{margin-bottom:22px}
.field-group-title{font-size:.9rem;font-weight:600;color:var(--peach);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.field{margin-bottom:14px}
.field-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.field label{display:block;font-size:.8rem;font-weight:500;color:var(--text2);margin-bottom:4px}
.field .desc{font-size:.72rem;color:var(--muted);margin-top:2px}
input[type="text"],input[type="number"],select,textarea{
  width:100%;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);font-size:.82rem;font-family:var(--sans);transition:.15s;outline:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(137,180,250,.15)}
input[type="number"]{width:120px}
select{cursor:pointer;appearance:auto}
textarea{font-family:var(--mono);min-height:60px;resize:vertical}
.toggle{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:var(--surface);border-radius:10px;cursor:pointer;transition:.2s}
.toggle .slider::before{content:'';position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:var(--muted);border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:var(--accent)}
.toggle input:checked+.slider::before{transform:translateX(16px);background:var(--bright)}
.arr-list{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.arr-item{display:flex;align-items:center;gap:6px}
.arr-item input{flex:1}
.arr-item .rm{background:none;border:none;color:var(--red);cursor:pointer;font-size:1rem;padding:2px 6px;border-radius:3px;transition:.15s}
.arr-item .rm:hover{background:rgba(243,139,168,.12)}
.arr-add{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:none;border:1px dashed var(--border);border-radius:var(--r);color:var(--accent);font-size:.75rem;cursor:pointer;margin-top:4px;transition:.15s}
.arr-add:hover{border-color:var(--accent);background:rgba(137,180,250,.06)}
.kv-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.kv-row input{flex:1}
.kv-row .k{max-width:160px}
.kv-row .rm{background:none;border:none;color:var(--red);cursor:pointer;font-size:1rem;padding:2px 6px}
.secret-ref{border:1px solid var(--mauve);border-radius:var(--r);padding:10px;background:rgba(203,166,247,.04);margin-top:4px}
.secret-ref .lock{color:var(--mauve);font-size:.75rem;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.secret-ref .lock svg{width:12px;height:12px}
.secret-ref .sr-fields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.secret-ref .sr-fields label{font-size:.7rem;color:var(--mauve)}
.sub-card{border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:14px;background:rgba(49,50,68,.3)}
.sub-card-title{font-size:.85rem;font-weight:600;color:var(--teal);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sub-card-title .rm{margin-left:auto}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--accent);color:var(--text);padding:10px 18px;border-radius:var(--r);font-size:.82rem;z-index:999;opacity:0;transform:translateY(10px);transition:.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>

// ==================== STATE ====================
let config = {};
let activeSection = null;
let previewOpen = false;

// ==================== UTILITY ====================
function deepGet(obj, path) {
  return path.split('.').reduce((o, k) => (o && o[k] !== undefined) ? o[k] : undefined, obj);
}
function deepSet(obj, path, val) {
  const keys = path.split('.');
  let cur = obj;
  for (let i = 0; i < keys.length - 1; i++) {
    if (cur[keys[i]] === undefined || typeof cur[keys[i]] !== 'object' || Array.isArray(cur[keys[i]])) cur[keys[i]] = {};
    cur = cur[keys[i]];
  }
  if (val === undefined || val === '') delete cur[keys[keys.length - 1]];
  else cur[keys[keys.length - 1]] = val;
}
function deepClone(o) { return JSON.parse(JSON.stringify(o)); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function cleanObj(obj) {
  if (Array.isArray(obj)) {
    const a = obj.map(cleanObj).filter(v => v !== undefined);
    return a.length ? a : undefined;
  }
  if (obj && typeof obj === 'object') {
    const o = {};
    for (const [k, v] of Object.entries(obj)) {
      const c = cleanObj(v);
      if (c !== undefined) o[k] = c;
    }
    return Object.keys(o).length ? o : undefined;
  }
  if (obj === '' || obj === undefined || obj === null) return undefined;
  return obj;
}
function getExportConfig() { return cleanObj(deepClone(config)) || {}; }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ==================== RENDER SIDEBAR ====================
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';
  for (const sec of SECTIONS) {
    const hasSubs = sec.subs && sec.subs.length;
    const isSubActive = hasSubs && sec.subs.some(s => s.id === activeSection);
    const isActive = activeSection === sec.id || (!hasSubs && activeSection === sec.id);
    html += '<div class="sb-sec">';
    html += '<div class="sb-hdr' + (isActive || isSubActive ? ' active' : '') + (isSubActive ? ' exp' : '') + '" data-sec="' + sec.id + '" onclick="clickSection(\'' + sec.id + '\')">';
    html += '<span class="ico">' + sec.icon + '</span>' + sec.label;
    if (hasSubs) html += '<span class="chv">\u25B6</span>';
    html += '</div>';
    if (hasSubs) {
      html += '<div class="sb-items">';
      for (const sub of sec.subs) {
        html += '<div class="sb-item' + (activeSection === sub.id ? ' active' : '') + '" data-sec="' + sub.id + '" onclick="clickSection(\'' + sub.id + '\')">' + sub.label + '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }
  sb.innerHTML = html;
}

function clickSection(id) {
  const sec = SECTIONS.find(s => s.id === id);
  if (sec && sec.subs) {
    const hdr = document.querySelector('.sb-hdr[data-sec="' + id + '"]');
    if (hdr) hdr.classList.toggle('exp');
    if (!sec.subs.find(s => s.id === activeSection)) {
      activeSection = sec.subs[0].id;
      renderSidebar();
      renderContent();
      updatePreview();
    }
    return;
  }
  activeSection = id;
  for (const s of SECTIONS) {
    if (s.subs) {
      if (s.subs.find(ss => ss.id === id)) {
        const hdr = document.querySelector('.sb-hdr[data-sec="' + s.id + '"]');
        if (hdr && !hdr.classList.contains('exp')) hdr.classList.add('exp');
        break;
      }
    }
  }
  renderSidebar();
  renderContent();
  updatePreview();
}

// ==================== RENDER CONTENT ====================
function renderContent() {
  const el = document.getElementById('content');
  let section = SECTIONS.find(s => s.id === activeSection);
  let sub = null;
  if (!section) {
    for (const s of SECTIONS) {
      if (s.subs) {
        sub = s.subs.find(ss => ss.id === activeSection);
        if (sub) { section = s; break; }
      }
    }
  }
  if (!section && !sub) { el.innerHTML = '<p style="color:var(--muted)">Select a section</p>'; return; }
  const target = sub || section;
  let html = '<div class="sec-title">' + section.icon + ' ' + (sub ? section.label + ' \u2192 ' + sub.label : section.label) + '</div>';
  html += '<div class="sec-desc">' + getDesc(target.id) + '</div>';
  if (target.custom === 'agentList') { html += renderAgentList(); }
  else if (target.custom === 'bindingsList') { html += renderBindingsList(); }
  else if (target.groups) {
    for (const g of target.groups) {
      html += '<div class="field-group"><div class="field-group-title">' + g.title + '</div>';
      for (const f of g.fields) html += renderField(f);
      html += '</div>';
    }
  } else if (target.fields) {
    for (const f of target.fields) html += renderField(f);
  }
  el.innerHTML = html;
}

    'commands':'Command availability and permissions.',
    'channels.whatsapp':'WhatsApp channel configuration.',
    'channels.telegram':'Telegram channel configuration.',

// ==================== FIELD RENDERERS ====================
function renderField(f) {
  const val = deepGet(config, f.k);
  let html = '<div class="field" data-key="' + f.k + '">';
  switch (f.type) {
    case 'bool':
      html += '<div class="field-row"><label class="toggle"><input type="checkbox" data-path="' + f.k + '" ' + (val ? 'checked' : '') + ' onchange="setVal(\'' + f.k + '\', this.checked)"><span class="slider"></span></label><label style="margin:0;cursor:pointer" onclick="this.previousElementSibling.querySelector(\'input\').click()">' + f.label + '</label></div>';
      break;
    case 'select':
      html += '<label>' + f.label + '</label><select data-path="' + f.k + '" onchange="setVal(\'' + f.k + '\', this.value || undefined)"><option value="">(not set)</option>';
      for (const o of f.opts) html += '<option value="' + o + '"' + (String(val) === o ? ' selected' : '') + '>' + o + '</option>';
      html += '</select>';
      break;
    case 'number':
      html += '<label>' + f.label + '</label><input type="number" data-path="' + f.k + '" value="' + (val !== undefined ? val : '') + '" onchange="setVal(\'' + f.k + '\', this.value ? Number(this.value) : undefined)">';
      break;
    case 'string':
      html += '<label>' + f.label + '</label><input type="text" data-path="' + f.k + '" value="' + escHtml(val !== undefined ? String(val) : '') + '" onchange="setVal(\'' + f.k + '\', this.value || undefined)">';
      break;
    case 'array':
      html += '<label>' + f.label + '</label>' + renderArrayEditor(f.k, val);
      break;
    case 'kv':
      html += '<label>' + f.label + '</label>' + renderKvEditor(f.k, val);
      break;
    case 'kv-object':
      html += '<label>' + f.label + '</label>' + renderKvObjectEditor(f.k, val, f.valType);
      break;
    case 'secretRef':
      html += '<label>' + f.label + '</label>' + renderSecretRef(f.k, val);
      break;
  }
  if (f.desc) html += '<div class="desc">' + f.desc + '</div>';
  html += '</div>';
  return html;
}

function renderArrayEditor(path, val) {
  const arr = Array.isArray(val) ? val : [];
  let html = '<div class="arr-list" data-arr="' + path + '">';
  arr.forEach(function(item, i) {
    html += '<div class="arr-item"><input type="text" value="' + escHtml(item) + '" data-arr-path="' + path + '" data-idx="' + i + '" onchange="updateArr(\'' + path + '\', ' + i + ', this.value)"><button class="rm" onclick="removeArr(\'' + path + '\', ' + i + ')">×</button></div>';
  });

  return html;
}

function renderKvEditor(path, val) {
  const obj = (val && typeof val === 'object' && !Array.isArray(val)) ? val : {};
  const entries = Object.entries(obj);
  let html = '<div class="arr-list" data-kv="' + path + '">';
  entries.forEach(function(e) {
    html += '<div class="kv-row"><input type="text" class="k" value="' + escHtml(e[0]) + '" placeholder="key" onchange="renameKv(\'' + path + '\',\'' + escHtml(e[0]) + '\',this.value)"><input type="text" value="' + escHtml(e[1]) + '" placeholder="value" onchange="updateKvVal(\'' + path + '\',\'' + escHtml(e[0]) + '\',this.value)"><button class="rm" onclick="removeKv(\'' + path + '\',\'' + escHtml(e[0]) + '\')">×</button></div>';

  html += '</div><button class="arr-add" onclick="addKv(\'' + path + '\')">+ Add entry</button>';

function renderKvObjectEditor(path, val, valType) {

// ==================== EVENT HANDLERS ====================
function setVal(path, val) { deepSet(config, path, val); updatePreview(); }

// Array ops
function updateArr(path, idx, val) {
  var arr = deepGet(config, path) || []; arr = arr.slice(); arr[idx] = val;
  deepSet(config, path, arr); updatePreview();
}
function removeArr(path, idx) {
  var arr = deepGet(config, path) || []; arr = arr.slice(); arr.splice(idx, 1);
  deepSet(config, path, arr.length ? arr : undefined); renderContent(); updatePreview();
}
function addArr(path) {
  var arr = deepGet(config, path) || []; arr = arr.concat(['']);
  deepSet(config, path, arr); renderContent(); updatePreview();
}
function updateInlineArr(path, idx, val) {
  var arr = deepGet(config, path) || []; arr = arr.slice(); arr[idx] = val;
  deepSet(config, path, arr); updatePreview();
}
function removeInlineArr(path, idx) {
  var arr = deepGet(config, path) || []; arr = arr.slice(); arr.splice(idx, 1);
  deepSet(config, path, arr.length ? arr : undefined); renderContent(); updatePreview();
}
function addInlineArr(path) {
  var arr = deepGet(config, path) || []; arr = arr.concat(['']);
  deepSet(config, path, arr); renderContent(); updatePreview();
}

// KV ops
function updateKvVal(path, key, val) {
  var obj = deepGet(config, path) || {}; obj = Object.assign({}, obj); obj[key] = val;
  deepSet(config, path, obj); updatePreview();
}
function renameKv(path, oldKey, newKey) {
  if (oldKey === newKey) return;
  var obj = deepGet(config, path) || {}; var newObj = {};
  for (var k in obj) { newObj[k === oldKey ? newKey : k] = obj[k]; }
  deepSet(config, path, newObj); renderContent(); updatePreview();
}
function removeKv(path, key) {
  var obj = deepGet(config, path) || {}; obj = Object.assign({}, obj); delete obj[key];
  deepSet(config, path, Object.keys(obj).length ? obj : undefined); renderContent(); updatePreview();
}
function addKv(path) {
  var obj = deepGet(config, path) || {}; obj = Object.assign({}, obj);
  var k = prompt('Key name:'); if (!k) return; obj[k] = '';
  deepSet(config, path, obj); renderContent(); updatePreview();
}

// KV-Object ops
function updateKvo(path, key, val, type) {
  var obj = deepGet(config, path) || {}; obj = Object.assign({}, obj);
  if (type === 'json') { try { obj[key] = JSON.parse(val); } catch(e) { obj[key] = val; } }
  else { obj[key] = val; }
  deepSet(config, path, obj); updatePreview();
}
function removeKvo(path, key) {
  var obj = deepGet(config, path) || {}; obj = Object.assign({}, obj); delete obj[key];
  deepSet(config, path, Object.keys(obj).length ? obj : undefined); renderContent(); updatePreview();
}
function addKvo(path, valType) {
  var obj = deepGet(config, path) || {}; obj = Object.assign({}, obj);
  var k = prompt('Key name:'); if (!k) return; obj[k] = valType === 'json' ? {} : '';
  deepSet(config, path, obj); renderContent(); updatePreview();
}

// SecretRef
function updateSecretRef(path) {
  var srcEl = document.querySelector('[data-sr-path="' + path + '"][data-sr-field="source"]');
  var provEl = document.querySelector('[data-sr-path="' + path + '"][data-sr-field="provider"]');
  var idEl = document.querySelector('[data-sr-path="' + path + '"][data-sr-field="id"]');
  var source = srcEl ? srcEl.value : 'inline';
  var provider = provEl ? provEl.value : '';
  var id = idEl ? idEl.value : '';
  if (source === 'inline') { deepSet(config, path, id || undefined); }
  else {
    var ref = { source: source };
    if (provider) ref.provider = provider;
    if (id) ref.id = id;
    deepSet(config, path, ref);
  }
  updatePreview();
}

// Agent list ops
function updateAgent(idx, field, val) {
  var list = deepGet(config, 'agents.list') || [];
  if (list[idx]) { if (val === undefined || val === '') delete list[idx][field]; else list[idx][field] = val; }
  deepSet(config, 'agents.list', list); updatePreview();
}
function updateAgentNested(idx, nestedPath, val) {
  var list = deepGet(config, 'agents.list') || [];
  if (list[idx]) {
    var keys = nestedPath.split('.'); var cur = list[idx];
    for (var i = 0; i < keys.length - 1; i++) {
      if (!cur[keys[i]] || typeof cur[keys[i]] !== 'object') cur[keys[i]] = {};
      cur = cur[keys[i]];
    }
    if (val === undefined || val === '') delete cur[keys[keys.length-1]]; else cur[keys[keys.length-1]] = val;
  }
  deepSet(config, 'agents.list', list); updatePreview();
}
function addAgent() {
  var list = deepGet(config, 'agents.list') || []; list.push({ id: 'new-agent' });
  deepSet(config, 'agents.list', list); renderContent(); updatePreview();
}
function removeAgent(idx) {
  var list = deepGet(config, 'agents.list') || []; list.splice(idx, 1);
  deepSet(config, 'agents.list', list); renderContent(); updatePreview();
}

// Binding ops
function updateBinding(idx, field, val) {
  var list = deepGet(config, 'bindings') || [];
  if (list[idx]) list[idx][field] = val || undefined;
  deepSet(config, 'bindings', list); updatePreview();
}
function updateBindingMatch(idx, field, val) {
  var list = deepGet(config, 'bindings') || [];
  if (list[idx]) { if (!list[idx].match) list[idx].match = {}; if (val) list[idx].match[field] = val; else delete list[idx].match[field]; }
  deepSet(config, 'bindings', list); updatePreview();
}
function updateBindingPeer(idx, val) {
  var list = deepGet(config, 'bindings') || [];
  if (list[idx]) { if (!list[idx].match) list[idx].match = {}; if (val) { if (!list[idx].match.peer) list[idx].match.peer = {}; list[idx].match.peer.id = val; } else { delete list[idx].match.peer; } }
  deepSet(config, 'bindings', list); updatePreview();
}
function addBinding() {
  var list = deepGet(config, 'bindings') || []; list.push({ agentId: '', match: {} });
  deepSet(config, 'bindings', list); renderContent(); updatePreview();
}
function removeBinding(idx) {
  var list = deepGet(config, 'bindings') || []; list.splice(idx, 1);
  deepSet(config, 'bindings', list); renderContent(); updatePreview();
}

// ==================== IMPORT / EXPORT ====================
function doImport() {
  var fi = document.getElementById('fileInput'); fi.value = '';
  fi.onchange = function() {
    var file = fi.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      try { config = JSON.parse(e.target.result); toast('\u2713 Imported ' + file.name); renderSidebar(); renderContent(); updatePreview(); }
      catch (err) { toast('\u2717 Invalid JSON: ' + err.message); }
    };
    reader.readAsText(file);
  };
  fi.click();
}
function doExport() {
  var json = JSON.stringify(getExportConfig(), null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href = url; a.download = 'openclaw.json'; a.click();
  URL.revokeObjectURL(url); toast('\u2713 Exported openclaw.json');
}
function doCopy() {
  var json = JSON.stringify(getExportConfig(), null, 2);
  if (navigator.clipboard) {
    navigator.clipboard.writeText(json).then(function() { toast('\u2713 Copied to clipboard'); });
  } else {
    var ta = document.createElement('textarea'); ta.value = json; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta); toast('\u2713 Copied');
  }
}
function loadTemplate() {
  config = deepClone(TEMPLATE_CONFIG); toast('\u2713 Template loaded'); renderSidebar(); renderContent(); updatePreview();
}

// ==================== PREVIEW ====================
function togglePreview() {
  previewOpen = !previewOpen;
  document.getElementById('preview').classList.toggle('open', previewOpen);
  if (previewOpen) updatePreview();
}
function updatePreview() {
  if (!previewOpen) return;
  document.getElementById('previewCode').textContent = JSON.stringify(getExportConfig(), null, 2);
}

// ==================== INIT ====================
config = deepClone(TEMPLATE_CONFIG);
activeSection = 'browser';
renderSidebar();
renderContent();
</script>
</body>
